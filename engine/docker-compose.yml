# Docker Compose configuration for local development.
# For production, remove the bind mount and the --reload flag.

services:
  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: estimator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: estimator-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  api:
    build: .
    image: estimator:latest
    container_name: estimator-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  tests:
    build: .
    image: estimator:latest
    depends_on:
      redis:
        condition: service_healthy
    command: ["uv", "run", "pytest"]
    environment:
      REDIS_URL: redis://redis:6379
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test-openai}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-test-anthropic}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-sk-test-google}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3.5:9b
      APP_ENV: test
      LOG_LEVEL: DEBUG

volumes:
  redis_data:
  ollama_data:
