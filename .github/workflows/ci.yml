name: Validate Estimator

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build tests

      - name: Run automated validation in Docker
        run: docker compose run --rm tests
