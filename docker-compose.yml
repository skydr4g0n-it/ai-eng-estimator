services:
  api:
    build: .
    image: estimator:latest
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

  # OPENAI_API_KEY/ANTHROPIC se inyectan en el contenedor: compose sustituye
  # ${VAR} leyendo la shell o el .env al lado de este archivo. El contenedor
  # no carga un archivo .env (no se copia en la imagen); Python solo ve
  # variables de entorno. Sin key en .env o en el entorno, la sustitucion
  # queda vacia y se salta el test de integracion con LLM.
  tests:
    build: .
    image: estimator:latest
    command: ["uv", "run", "pytest"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      APP_ENV: test
      LOG_LEVEL: DEBUG
